name: pm-intern-watch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pm-intern-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: check for new PM roles
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python check.py

      - name: save state
        run: |
          git config user.name "pm-intern-watch"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json
          git commit -m "update seen state" || echo "nothing to commit"
          git pull --rebase --autostash || true
          git push
